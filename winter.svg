<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g stroke="#7fb8d0" stroke-width="3.5" stroke-linecap="round" fill="none">
    <animateTransform attributeName="transform" type="rotate"
                      from="0 50 50" to="360 50 50" dur="25s" repeatCount="indefinite"/>

    <!-- 3 hoofdarmen door midden -->
    <line x1="50" y1="10" x2="50" y2="90"/>
    <line x1="15" y1="30" x2="85" y2="70"/>
    <line x1="85" y1="30" x2="15" y2="70"/>

    <!-- versiering bovenkant -->
    <line x1="50" y1="22" x2="44" y2="30"/>
    <line x1="50" y1="22" x2="56" y2="30"/>
    <line x1="50" y1="36" x2="46" y2="42"/>
    <line x1="50" y1="36" x2="54" y2="42"/>

    <!-- onderkant -->
    <line x1="50" y1="78" x2="44" y2="70"/>
    <line x1="50" y1="78" x2="56" y2="70"/>
    <line x1="50" y1="64" x2="46" y2="58"/>
    <line x1="50" y1="64" x2="54" y2="58"/>

    <!-- NO arm -->
    <line x1="74" y1="36" x2="68" y2="36"/>
    <line x1="74" y1="36" x2="74" y2="42"/>

    <!-- ZW arm -->
    <line x1="26" y1="64" x2="32" y2="64"/>
    <line x1="26" y1="64" x2="26" y2="58"/>

    <!-- NW arm -->
    <line x1="26" y1="36" x2="32" y2="36"/>
    <line x1="26" y1="36" x2="26" y2="42"/>

    <!-- ZO arm -->
    <line x1="74" y1="64" x2="68" y2="64"/>
    <line x1="74" y1="64" x2="74" y2="58"/>
  </g>
  <!-- middenpunt -->
  <circle cx="50" cy="50" r="3" fill="#7fb8d0"/>
</svg>
