<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- takje met blaadjes -->
  <path d="M5,85 Q50,82 95,85" stroke="#8b6f47" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="88" cy="80" rx="5" ry="2.5" fill="#9ec99e" transform="rotate(-30 88 80)"/>
  <ellipse cx="12" cy="80" rx="4" ry="2"   fill="#b0d8b0" transform="rotate(30 12 80)"/>

  <!-- vogeltje, hopt af en toe -->
  <g>
    <animateTransform attributeName="transform" type="translate"
                      values="0,0; 0,0; 0,-5; 0,-2; 0,0; 0,0"
                      keyTimes="0; 0.75; 0.82; 0.88; 0.94; 1"
                      dur="9s" repeatCount="indefinite"/>
    <!-- lijfje -->
    <ellipse cx="55" cy="62" rx="20" ry="16" fill="#7fc2e0"/>
    <!-- kop -->
    <circle cx="40" cy="54" r="11" fill="#7fc2e0"/>
    <!-- buikje (lichter) -->
    <ellipse cx="52" cy="66" rx="14" ry="10" fill="#b8dfee"/>
    <!-- vleugel -->
    <path d="M52,58 Q62,52 68,62 Q60,68 52,64 Z" fill="#5fa6c8"/>
    <!-- staart -->
    <path d="M73,60 L84,55 L80,62 L84,69 L73,64 Z" fill="#5fa6c8"/>
    <!-- snavel -->
    <path d="M30,52 L22,54 L30,56 Z" fill="#f0a830"/>
    <!-- oog -->
    <circle cx="37" cy="52" r="2.2" fill="#282828"/>
    <circle cx="37.7" cy="51.3" r="0.7" fill="#fff"/>
    <!-- pootjes -->
    <line x1="50" y1="77" x2="50" y2="83" stroke="#8b6f47" stroke-width="2" stroke-linecap="round"/>
    <line x1="58" y1="77" x2="58" y2="83" stroke="#8b6f47" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
